<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Gunn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .hero-font { font-family: 'Playfair Display', sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-link { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-link:hover { color: #6366f1; transform: translateY(-1px); }
        .card-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(99 102 241); }
    </style>
</head>
<body class="bg-zinc-950 text-white overflow-x-hidden">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/80 backdrop-blur-lg border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <span class="text-2xl">🦅</span>
                <span class="font-semibold text-xl tracking-tight">Griffin Gunn</span>
            </div>
            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                <a href="#about" class="nav-link">About</a>
                <a href="#work" class="nav-link">Work</a>
                <a href="#journal" class="nav-link">Journal</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
            <a href="#contact" class="px-6 py-2.5 bg-white text-zinc-900 rounded-2xl font-semibold text-sm hover:bg-indigo-100 transition-colors">Let's connect</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="min-h-screen flex items-center pt-20">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="space-y-8">
                <div class="inline-flex items-center gap-x-2 bg-white/10 text-white text-sm px-5 py-2 rounded-3xl backdrop-blur">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    Available for opportunities
                </div>
                <h1 class="hero-font text-7xl md:text-8xl leading-none tracking-tighter">Griffin<br>Gunn</h1>
                <p class="text-3xl text-zinc-400 max-w-md">Crafting digital experiences with precision and soul.</p>
                <div class="flex items-center gap-x-4">
                    <a href="#work" class="px-8 py-4 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-3xl font-semibold flex items-center gap-x-2 hover:shadow-2xl hover:shadow-indigo-500/30 transition-all">
                        View my work <i class="fa-solid fa-arrow-right"></i>
                    </a>
                    <a href="#contact" class="px-8 py-4 border border-white/30 hover:border-white/70 rounded-3xl font-medium transition-colors">Get in touch</a>
                </div>
            </div>
            <div class="hidden md:block relative">
                <div class="bg-zinc-900 border border-white/10 rounded-3xl p-3 shadow-2xl">
                    <div class="bg-black rounded-2xl aspect-video flex items-center justify-center text-8xl">🦅</div>
                </div>
            </div>
        </div>
    </section>
